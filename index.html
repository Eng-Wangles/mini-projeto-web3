<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registrar Dados na Blockchain</title>

    <!-- Carregar ethers.js no HEAD! -->
    <script src="https://unpkg.com/ethers@6.8.1/dist/ethers.umd.min.js"></script>
        crossorigin="anonymous"></script>

    <style>
        body{font-family:sans-serif;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);min-height:100vh;display:flex;justify-content:center;align-items:center;padding:20px;}
        .container{background:#fff;border-radius:12px;box-shadow:0 20px 60px rgba(0,0,0,0.15);padding:40px;max-width:400px;width:100%;}
        .subtitle{color:#666;margin-bottom:20px;font-size:14px;}
        .status-box.connected{background:#f0fff4;border-left:4px solid #48bb78;}
        .status-box.disconnected{background:#fff5f5;border-left:4px solid #f56565;}
        .status-box{margin-bottom:18px;padding:12px;border-radius:5px;font-size:13px;}
        button{padding:10px 18px;border:none;border-radius:6px;font-size:15px;font-weight:600;margin-right:7px;margin-bottom:10px;cursor:pointer;}
        .btn-connect{background:#667eea;color:#fff;}
        .btn-disconnect{background:#e2e8f0;color:#333;}
        .btn-connect:disabled{background:#a3aed6;}
        label{display:block;margin-bottom:9px;margin-top:12px;font-weight:600;}
        input{width:100%;padding:10px;border:1px solid #ccc;border-radius:6px;}
        .btn-submit{width:100%;background:#667eea;color:white;}
        .btn-submit:disabled{background:#bfc6db;}
        .response-box.success{background:#f0fff4;border:1px solid #9ae6b4;color:#22543d;padding:10px;border-radius:6px;margin-top:18px;}
        .response-box.error{background:#fff5f5;border:1px solid #fc8181;color:#742a2a;padding:10px;border-radius:6px;margin-top:18px;}
        .response-box.loading{background:#f0f4ff;color:#2c5282;padding:10px;border-radius:6px;margin-top:18px;}
        .tx-link{word-break:break-all;font-size:13px}
    </style>
</head>
<body>
<div class="container">
    <h2>Registrar dados na Blockchain</h2>
    <div class="subtitle">Contrato Sepolia 0x4dB20f580be4d5df4A560Eff8E581514674E4B7f</div>
    <div id="statusBox" class="status-box disconnected">
        <div>Status: Desconectado</div>
    </div>
    <button class="btn-connect" id="connectBtn" disabled>Conectar Carteira</button>
    <button class="btn-disconnect" id="disconnectBtn" disabled>Desconectar</button>
    <label for="productData">Dados do produto</label>
    <input id="productData" type="text" placeholder="Ex: Produto enviado - Pedido #123" disabled>
    <button class="btn-submit" id="submitBtn" disabled>Registrar na Blockchain</button>
    <div id="responseBox"></div>
</div>

<script>
const CONTRACT_ADDRESS = "0x4dB20f580be4d5df4A560Eff8E581514674E4B7f";
const CONTRACT_ABI = [
    {"inputs":[{"internalType":"string","name":"data","type":"string"}],"name":"registerData","outputs":[],"stateMutability":"nonpayable","type":"function"},
    {"inputs":[],"name":"getLatestData","outputs":[{"internalType":"string","name":"","type":"string"},{"internalType":"address","name":"","type":"address"},{"internalType":"uint256","name":"","type":"uint256"}],"stateMutability":"view","type":"function"}
];

let provider = null, signer = null, contract = null, currentAccount = null;

function setUIConnected(account) {
    document.getElementById('statusBox').className = 'status-box connected';
    document.getElementById('statusBox').innerHTML = `<div>✓ Conectado: <span style="font-family:monospace">${account}</span></div>`;
    document.getElementById('connectBtn').disabled = true;
    document.getElementById('disconnectBtn').disabled = false;
    document.getElementById('productData').disabled = false;
    document.getElementById('submitBtn').disabled = false;
}
function setUIDisconnected() {
    document.getElementById('statusBox').className = 'status-box disconnected';
    document.getElementById('statusBox').innerHTML = `<div>Status: Desconectado</div>`;
    document.getElementById('connectBtn').disabled = false;
    document.getElementById('disconnectBtn').disabled = true;
    document.getElementById('productData').disabled = true;
    document.getElementById('submitBtn').disabled = true;
}
function showResponse(msg, type) {
    const el = document.getElementById('responseBox');
    if (!msg) { el.innerHTML=''; return; }
    let cls = type?'response-box '+type:'';
    el.innerHTML = `<div class="${cls}">${msg}</div>`;
}

async function connectWallet() {
    if (!window.ethereum) {
        showResponse('MetaMask não instalado.', 'error'); return;
    }
    try {
        provider = new ethers.BrowserProvider(window.ethereum);
        await window.ethereum.request({method:"eth_requestAccounts"});
        signer = await provider.getSigner();
        contract = new ethers.Contract(CONTRACT_ADDRESS, CONTRACT_ABI, signer);
        let address = await signer.getAddress();
        // valida chainId
        const n = await provider.getNetwork();
        if (n.chainId !== 11155111) {
            showResponse('Por favor, selecione a Sepolia no MetaMask.', 'error');
            return;
        }
        currentAccount = address;
        setUIConnected(currentAccount);
        showResponse('Carteira conectada!','success');
    } catch(e) { showResponse('Erro: '+ (e.info?.error?.message || e.message), 'error'); }
}
async function disconnectWallet() {
    currentAccount = null; provider = null; signer = null; contract = null;
    setUIDisconnected();
    showResponse('', '');
}
async function registerData() {
    if (!contract || !signer) { showResponse('Conecte a carteira.', 'error'); return; }
    const value = document.getElementById('productData').value.trim();
    if (!value) { showResponse('Digite algum dado para registrar.', 'error'); return; }
    try {
        showResponse('Enviando transação...', 'loading');
        document.getElementById('submitBtn').disabled = true;
        const tx = await contract.registerData(value);
        showResponse(`Transação enviada: <span class="tx-link">${tx.hash}</span>`, 'loading');
        const receipt = await tx.wait();
        showResponse(
          `Dados registrados com sucesso!<br>
           <a class="tx-link" href="https://sepolia.etherscan.io/tx/${receipt.hash}" target="_blank">Ver transação ${receipt.hash}</a>`,
           'success');
        document.getElementById('productData').value = '';
    } catch(e) {
        showResponse('Erro Tx: '+(e.info?.error?.message || e.message), 'error');
    } finally {
        document.getElementById('submitBtn').disabled = false;
    }
}
// Habilita o botão só quando ethers.js estiver disponível
function waitForEthers() {
    const btn = document.getElementById('connectBtn');
    if (window.ethers && ethers.BrowserProvider) {
        btn.disabled = false;
        btn.onclick = connectWallet;
    } else {
        btn.disabled = true;
        setTimeout(waitForEthers, 120);
    }
}
waitForEthers();

// outros binds
document.getElementById('disconnectBtn').onclick = disconnectWallet;
document.getElementById('submitBtn').onclick = registerData;

if (window.ethereum) {
    window.ethereum.on('accountsChanged', () => {
        disconnectWallet();
        showResponse('Conta alterada, reconecte.', 'error');
    });
    window.ethereum.on('chainChanged', ()=>location.reload());
}
</script>
</body>
</html>
